<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STAR HOME</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    width:360px;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    overflow:hidden;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:18px;
}

h1{
    font-size:24px;
    margin:10px 0;
}

.brand{
    color:#1565C0;
    font-weight:bold;
}

.price{
    color:red;
    font-size:28px;
    font-weight:bold;
    margin:10px 0;
}

button{
    width:100%;
    padding:15px;
    background:#1565C0;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<img src="https://images.unsplash.com/photo-1493663284031-b7e3aefcae8e?w=900" alt="Ghế Sofa">



<div class="content">

<div class="brand">STAR HOME</div>

<h1>Ghế Sofa Nordic Premium</h1>

<p>⭐⭐⭐⭐⭐ 4.9 (253 đánh giá)</p>

<div class="price">3.699.000 VND</div>

<p>
Thiết kế Bắc Âu hiện đại.<br>
Khung gỗ sồi tự nhiên.<br>
Bảo hành 5 năm.
</p>

<button>
📱 XEM THỬ BẰNG AR
</button>

</div>

</div>

</body>
</html>
